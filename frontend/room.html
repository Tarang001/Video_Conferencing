<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Conference - Room</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Connecting Overlay -->
  <div id="connecting-overlay" class="connecting-overlay">
    <div class="spinner"></div>
    <p id="connecting-status">Connecting to room...</p>
  </div>

  <div class="room-container">
    <!-- Header -->
    <header class="room-header">
      <div class="room-info">
        <span class="room-id" id="room-id-display">Room: ---</span>
        <span class="participant-count" id="participant-count">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <span id="participant-number">0</span>
        </span>
      </div>
      
      <div class="connection-status" id="connection-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Connecting</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="room-main">
      <!-- Video Grid -->
      <section class="video-section">
        <div class="video-grid grid-1" id="video-grid">
          <!-- Video tiles will be dynamically added here -->
        </div>
      </section>

      <!-- Chat Panel -->
      <aside class="chat-panel hidden" id="chat-panel">
        <div class="chat-header">
          <span>Chat</span>
          <button class="btn btn-secondary" id="close-chat" style="padding: 4px 8px; font-size: 12px;">Close</button>
        </div>
        
        <div class="chat-messages" id="chat-messages">
          <!-- Chat messages will be added here -->
        </div>
        
        <div class="chat-input-container">
          <input 
            type="text" 
            class="form-control" 
            id="chat-input" 
            placeholder="Type a message..."
            maxlength="500"
          >
          <button class="btn btn-primary" id="send-message-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
          </button>
        </div>
      </aside>
    </main>

    <!-- Controls Bar -->
    <footer class="controls-bar">
      <!-- Mute Audio -->
      <div class="control-btn">
        <button class="btn btn-secondary btn-icon" id="toggle-audio" title="Toggle Microphone">
          <svg id="mic-on-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
          </svg>
          <svg id="mic-off-icon" style="display: none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
          </svg>
        </button>
        <span>Mic</span>
      </div>

      <!-- Toggle Video -->
      <div class="control-btn">
        <button class="btn btn-secondary btn-icon" id="toggle-video" title="Toggle Camera">
          <svg id="video-on-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
          </svg>
          <svg id="video-off-icon" style="display: none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
          </svg>
        </button>
        <span>Video</span>
      </div>

      <!-- Toggle Chat -->
      <div class="control-btn">
        <button class="btn btn-secondary btn-icon" id="toggle-chat" title="Toggle Chat">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
          </svg>
        </button>
        <span>Chat</span>
      </div>

      <!-- Leave Room -->
      <div class="control-btn">
        <button class="btn btn-danger btn-icon" id="leave-room" title="Leave Room">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
        <span>Leave</span>
      </div>
    </footer>
  </div>

  <!-- Load scripts in order -->
  <script type="module" src="/js/socket.js"></script>
  <script type="module" src="/js/webrtc.js"></script>
  <script type="module" src="/js/room.js"></script>
</body>
</html>
